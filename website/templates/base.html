<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>{{page_title}} | Eswatini Facts</title>
    <meta name="description" content="{{page_description}}">
    <meta name="keywords" content="{{page_keywords}}">
    <meta name="author" content="Eswatini Facts">
    <link rel="canonical" href="https://eswatinifacts.com{{canonical_url}}">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{page_title}} | Eswatini Facts">
    <meta property="og:description" content="{{page_description}}">
    <meta property="og:image" content="https://eswatinifacts.com/images/{{og_image}}">
    <meta property="og:url" content="https://eswatinifacts.com{{canonical_url}}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Eswatini Facts">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{page_title}} | Eswatini Facts">
    <meta name="twitter:description" content="{{page_description}}">
    <meta name="twitter:image" content="https://eswatinifacts.com/images/{{og_image}}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Page-specific head content (analytics consent guard, GA tag, and
         page schema are preserved per page by the template manager). -->
    {{additional_head_content}}
</head>
<body>
    <!-- Header (injected client-side by js/main.js) -->
    <div id="header-placeholder"></div>

    {{page_content}}

    <!-- Footer (injected client-side by js/main.js) -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
    {{additional_scripts}}
</body>
</html>
